version: "3.9"

services:
  web:
    build: .
    ports:
      - "${SERVER_PORT:-8000}:8000"
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
